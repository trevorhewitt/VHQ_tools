<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instructions</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .imgrow { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
    .imgrow img { display: block; }
  
    .exampleBox {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin: 10px 0;
    }
  
    .exampleLabel { font-weight: 600; margin-bottom: 6px; }
  
    /* Align arrows with the 5 Likert buttons */
    .arrowRow {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;               /* match your Likert gap */
      margin: 6px 0 8px 0;
      font-size: 16px;
      line-height: 1;
    }
  
    .arrowCell { text-align: center; }
  </style>
</head>
<body>
  <h1><strong>Instructions</strong></h1>

  <div class="section" aria-live="polite">
    <div id="pageContainer"></div>

    <div class="row" style="margin-top:14px;">
      <button id="backBtn" type="button">Back</button>
      <button id="nextBtn" type="button">Next</button>
    </div>
  </div>

  <script type="module" src="instructions.js"></script>
</body>
</html>
